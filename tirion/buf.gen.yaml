version: v1
plugins:
  - name: go
    out: internal/pb
    opt:
    - paths=import
    strategy: directory

  - name: go-grpc
    out: internal/pb
    opt:
    - paths=import
    strategy: directory

  - name: grpc-gateway
    out: internal/pb
    opt:
      - paths=import
      - generate_unbound_methods=true

  - name: openapiv2
    out: api/swagger
    opt:
      - logtostderr=true
      - allow_merge=true
      - merge_file_name=tirion
      - generate_unbound_methods=true
      - file=api/tirion.proto